# binance-trade 运行配置（非敏感，可提交）
# 密钥一律走 .env，本文件只放环境变量名。

# ===== 运行模式 =====
mode: testnet                 # testnet | mainnet，一键切换

# ===== 交易标的（USDT-M 永续）=====
symbols:
  - BTCUSDT
  - ETHUSDT
  - BNBUSDT

# ===== 账户与保证金 =====
account:
  margin_mode: ISOLATED       # ISOLATED | CROSS，无仓位时可动态调整
  quote_asset: USDT
  initial_capital: 200        # 仅记录用途，实际以交易所余额为准

# ===== 决策周期与节流 =====
cycle:
  interval: 5m                # 主循环周期：支持 1m/3m/5m/15m/30m/1h
  heartbeat_on_skip: true     # 跳过 LLM 时是否写心跳日志

throttle:                     # 行情变化门槛（纯函数，全部可单测）
  price_change_pct: 0.3       # 相对上次决策价变动 ≥ 0.3% 才触发
  pnl_alert_pct: 1.0          # 持仓未实现盈亏触及该百分比即触发
  trigger_on_order_event: true  # 挂单成交/状态变化即触发
  max_skip_cycles: 6          # 连续跳过上限，达到即强制触发一次（兜底）

# ===== 风控（硬约束，优先级永远高于 LLM）=====
# 保证金与亏损上限均按「当前账户权益」动态计算，随资金自动缩放。
# LLM 会被告知资金尺度、单笔保证金上限和止损亏损上限；代码层仍以此为硬兜底。
risk:
  max_leverage: 5                  # LLM 建议 > 此值 → 直接拒单（不截断）
  on_leverage_exceed: REJECT       # 固定为 REJECT
  max_order_margin_pct: 0.2        # 单笔最多占用保证金 = 权益 × 20%
  max_symbol_margin_pct: 0.4       # 单标的累计占用保证金 = 权益 × 40%
  max_total_margin_pct: 0.8        # 全账户累计占用保证金 = 权益 × 80%
  max_loss_per_trade_pct: 2        # 止损触发时理论亏损 <= 权益 × 2%
  max_drawdown_pct: 20             # 账户最大回撤熔断阈值(%) → 平仓+停开新仓
  daily_max_loss_pct: 10           # 每日最大亏损 = 权益 × 10% → 当日停交易
  liq_distance_min_pct: 5          # 开仓前估算强平价，距现价 < 5% → 拒单
  min_confidence: 0.6              # LLM confidence 低于此值视为 HOLD

# ===== LLM 决策层 =====
llm:
  provider: anthropic
  model: claude-opus-4-8
  base_url: https://api.ikuncode.cc   # Anthropic 兼容中转；官方留空
  timeout: 60                 # 秒，超时降级 HOLD（中转比官方慢，留足余量）
  max_tokens: 1024
  max_retries: 2
  kline_lookback: 100         # 喂给 LLM 的 K 线根数
  kline_interval: 5m          # 主分析 K 线周期
  higher_timeframes: [15m, 1h]  # 多周期共振：额外喂这些更高周期的指标
  indicators: [ema, rsi, macd, atr, bollinger, volume]

# ===== 执行层 =====
execution:
  entry_mode: MAKER_FIRST     # MARKET_TAKER | MAKER_ONLY | MAKER_FIRST
  normal_exit_mode: MARKET_TAKER   # 策略主动平仓默认市价，避免部分平仓保护单失配
  emergency_exit_mode: MARKET_TAKER # 熔断/保护失败/kill-switch 永远走市价减仓
  maker_time_in_force: GTX    # Binance USD-M Post Only
  maker_timeout_seconds: 8
  maker_poll_seconds: 1
  maker_max_requotes: 2
  maker_price_offset_bps: 1
  maker_unfilled_action: CANCEL     # CANCEL | FALLBACK_MARKET
  partial_fill_action: PROTECT_AND_CANCEL_REST
  attach_sl_tp: true          # 是否同时挂止盈止损单
  rate_limit_backoff: 1.5     # 限频指数退避基数
  max_order_retries: 3
  recv_window: 5000           # 毫秒

# ===== 持久化 =====
storage:
  db_path_template: ./data/trade-{mode}.db  # SQLite，按 testnet/mainnet 隔离
  reconcile_on_start: true    # 启动与交易所对账

# ===== 监控告警 =====
notify:
  telegram_enabled: false
  telegram_bot_token_env: TELEGRAM_BOT_TOKEN
  telegram_chat_id_env: TELEGRAM_CHAT_ID
  notify_events: [OPEN, CLOSE, REJECT, CIRCUIT_BREAK, ERROR, KILL_SWITCH]

# ===== 日志 =====
logging:
  level: INFO
  dir: ./logs
  rotation: 50 MB
  retention: 30 days
  serialize: false            # true 输出 JSON 行日志

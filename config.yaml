# binance-trade 运行配置（非敏感，可提交）
# 密钥一律走 .env，本文件只放环境变量名。

# ===== 运行模式 =====
mode: testnet                 # testnet | mainnet，一键切换

# ===== 交易标的（USDT-M 永续）=====
symbols:
  - BTCUSDT
  - ETHUSDT
  - SOLUSDT
  - BNBUSDT

# ===== 账户与保证金 =====
account:
  margin_mode: ISOLATED       # ISOLATED | CROSS，无仓位时可动态调整
  quote_asset: USDT
  initial_capital: 200        # 仅记录用途，实际以交易所余额为准

# ===== 决策周期与节流 =====
cycle:
  interval: 3m                # 主循环周期：支持 1m/3m/5m/15m/30m/1h
  heartbeat_on_skip: true     # 跳过 LLM 时是否写心跳日志

throttle:                     # 行情变化门槛（纯函数，全部可单测）
  price_change_pct: 0.3       # 相对上次决策价变动 ≥ 0.3% 才触发
  pnl_alert_pct: 1.0          # 持仓未实现盈亏触及该百分比即触发
  trigger_on_order_event: true  # 挂单成交/状态变化即触发
  max_skip_cycles: 12         # 最终兜底：低波动无信号最长约 60min 复查
  feature_snapshot_enabled: true
  ema_spread_cross_min_pct: 0.02
  macd_hist_cross_min_abs: 0.0
  rsi_midline: 50
  boll_bandwidth_low_pct: 1.0
  boll_bandwidth_expand_pct: 25
  volume_zscore_trigger: 2.0
  micro_return_5m_trigger_pct: 0.5
  micro_range_5m_trigger_pct: 0.8
  near_exit_pnl_pct: 0.8
  review_flat_minutes: 60
  review_position_minutes: 15
  review_near_exit_minutes: 5
  review_high_vol_minutes: 5

# ===== 风控（硬约束，优先级永远高于 LLM）=====
# 保证金上限按当前账户权益动态计算；止损亏损上限按本订单保证金计算。
risk:
  max_leverage: 5                  # LLM 建议 > 此值 → 直接拒单（不截断）
  on_leverage_exceed: REJECT       # 固定为 REJECT
  max_order_margin_pct: 0.2        # 单笔最多占用保证金 = 权益 × 20%
  max_symbol_margin_pct: 0.4       # 单标的累计占用保证金 = 权益 × 40%
  max_total_margin_pct: 0.8        # testnet 保持原有全账户累计占用保证金 80%
  max_loss_per_order_margin_pct: 30 # 止损理论亏损 <= 本订单保证金 × 30%
  max_drawdown_pct: 20             # 账户最大回撤熔断阈值(%) → 平仓+停开新仓
  daily_max_loss_pct: 10           # testnet 保持原有每日最大亏损 10%
  liq_distance_min_pct: 5          # 开仓前估算强平价，距现价 < 5% → 拒单
  min_confidence: 0.6              # LLM confidence 低于此值视为 HOLD

# ===== LLM 决策层 =====
llm:
  provider: anthropic
  model: claude-opus-4-8
  timeout: 30                 # 秒，超时降级 HOLD
  max_tokens: 1024
  max_retries: 2
  kline_lookback: 120         # 主周期指标计算 K 线根数
  kline_interval: 5m          # 主分析 K 线周期
  prompt_kline_count: 48      # Prompt 保留的主周期原始 K 线根数：5m × 48
  micro_kline_interval: 1m    # Prompt 微观 K 线周期，用于最近入场节奏
  micro_kline_lookback: 30    # Prompt 微观 K 线根数：1m × 30
  higher_timeframes: [15m, 1h, 4h, 1d]  # 多周期共振：只发送计算后的指标
  indicators: [ema, rsi, macd, atr, bollinger, volume]

# ===== 执行层 =====
execution:
  entry_mode: MAKER_FIRST     # MARKET_TAKER | MAKER_ONLY | MAKER_FIRST
  normal_exit_mode: MARKET_TAKER   # 策略主动平仓默认市价，避免部分平仓保护单失配
  emergency_exit_mode: MARKET_TAKER # 熔断/保护失败/kill-switch 永远走市价减仓
  maker_time_in_force: GTX    # Binance USD-M Post Only
  maker_timeout_seconds: 15           # 单次 maker 挂单等待上限（之前 8s 太短）
  maker_poll_seconds: 1
  maker_max_requotes: 4               # 最多 4 次重挂（之前 2 次）
  maker_price_offset_bps: 5          # 挂单离盘口偏移（之前 1bps 太小，1-2s 内易被 Post-Only 撤单）
  maker_unfilled_action: FALLBACK_MARKET  # CANCEL | FALLBACK_MARKET（maker 全部未成交后市价兜底）
  # ---- 市价单滑点护栏（保护 FALLBACK_MARKET 兜底场景）----
  # 下单前用盘口估算市价单冲击价 vs 决策参考价，偏差超阈值就拒单。
  # 默认 8 bps = 0.08% 覆盖 BTC/ETH/BNB 正常+中等急跌；SOL 等中等币种单独放宽。
  market_slippage_bps: 8
  market_slippage_bps_per_symbol:
    SOLUSDT: 10                       # SOL 急跌时 spread 拉得更快，单独放宽到 10 bps
  partial_fill_action: PROTECT_AND_CANCEL_REST
  attach_sl_tp: true          # 是否同时挂止盈止损单
  rate_limit_backoff: 1.5     # 限频指数退避基数
  max_order_retries: 3
  recv_window: 5000           # 毫秒

# ===== 持久化 =====
storage:
  db_path_template: ./data/trade-{mode}.db  # SQLite，按 testnet/mainnet 隔离
  reconcile_on_start: true    # 启动与交易所对账

user_stream:
  enabled: true
  keepalive_seconds: 1800
  rotate_seconds: 82800
  reconnect_max_seconds: 30
  startup_buffer_limit: 10000
  reconcile_active_seconds: 30
  reconcile_idle_seconds: 120
  confirm_timeout_seconds: 10
  event_retention_days: 30

# ===== 监控告警 =====
notify:
  telegram_enabled: false
  telegram_bot_token_env: TELEGRAM_BOT_TOKEN
  telegram_chat_id_env: TELEGRAM_CHAT_ID
  notify_events: [OPEN, CLOSE, REJECT, CIRCUIT_BREAK, ERROR, KILL_SWITCH]

# ===== 日志 =====
logging:
  level: INFO
  dir: ./logs
  rotation: 50 MB
  retention: 30 days
  serialize: false            # true 输出 JSON 行日志

# biance-trade web 看板的 nginx 反向代理配置
# 放到 /etc/nginx/conf.d/biance-trade.conf，改 server_name / TLS 证书路径后 reload。
#
# 要点：
# - 前端 SPA 与 API 都由后端 uvicorn(127.0.0.1:8000) 提供，nginx 只做反代 + TLS。
# - /ws 需要 Upgrade 头透传，否则 WebSocket 握手失败。
# - Basic Auth 由后端 FastAPI 处理；如想在 nginx 再加一层，可用 auth_basic。

upstream biance_web {
    server 127.0.0.1:8000;
}

# HTTP → HTTPS 跳转（有证书时启用）
server {
    listen 80;
    server_name your-domain.example.com;   # ← 改成你的域名或服务器IP
    # 若暂无 TLS，可直接把下面 location 块挪到这个 server 里用 80 端口访问
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    http2 on;
    server_name your-domain.example.com;    # ← 改成你的域名

    # TLS 证书（用 certbot 或自签）
    ssl_certificate     /etc/letsencrypt/live/your-domain/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/your-domain/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;

    # 反代到后端
    location / {
        proxy_pass http://biance_web;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        # 透传 Authorization 头（Basic Auth）
        proxy_set_header Authorization $http_authorization;
    }

    # WebSocket：必须透传 Upgrade
    location /ws {
        proxy_pass http://biance_web;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header Authorization $http_authorization;
        proxy_read_timeout 3600s;   # 长连接，避免被提前断开
    }
}

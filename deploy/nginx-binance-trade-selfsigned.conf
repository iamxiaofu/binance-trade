# binance-trade web —— 自签 HTTPS 反代（用公网 IP 直接访问，无域名）
# 安装：cp 到 /etc/nginx/conf.d/binance-trade.conf && nginx -t && systemctl reload nginx
# 证书：deploy/certs/ 下的自签证书；浏览器首次访问需手动信任。

upstream binance_web {
    server 127.0.0.1:8000;
}

# 注意：本配置只接管 443。默认 nginx.conf 自带的 80 端口欢迎页保持不变，
# 互不冲突。请用 https://<服务器IP> 直接访问（自签证书，浏览器需手动信任）。
server {
    listen 443 ssl http2 default_server;
    server_name _;

    ssl_certificate     /data0/binance-trade/deploy/certs/selfsigned.crt;
    ssl_certificate_key /data0/binance-trade/deploy/certs/selfsigned.key;
    ssl_protocols TLSv1.2 TLSv1.3;

    location / {
        proxy_pass http://binance_web;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Authorization $http_authorization;
    }

    location /ws {
        proxy_pass http://binance_web;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header Authorization $http_authorization;
        proxy_read_timeout 3600s;
    }
}
